services:
  postgres:
    image: postgres:16-alpine
    container_name: edudev-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: edudev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
      POSTGRES_DB: edudev_crm
    ports:
      - "5432:5432"
    volumes:
      - edudev_crm_pgdata:/var/lib/postgresql/data

volumes:
  edudev_crm_pgdata:
