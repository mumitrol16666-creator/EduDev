server {
    listen 443 ssl http2;
    server_name docs.edudev.kz;

    root /var/www/edudev/docs;
    index index.html README.md;

    ssl_certificate /etc/letsencrypt/live/edudev.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edudev.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
