map $sent_http_content_type $cache_control_for_content {
    default "no-cache, no-store, must-revalidate";
    "~*text/css" "public, max-age=2592000";
    "~*application/javascript" "public, max-age=2592000";
    "~*image/" "public, max-age=31536000, immutable";
    "~*font/" "public, max-age=31536000, immutable";
}

upstream edudev_backend {
    server 127.0.0.1:4100;
    keepalive 16;
}

server {
    listen 80;
    server_name edudev.kz www.edudev.kz crm.edudev.kz api.edudev.kz docs.edudev.kz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.edudev.kz;

    ssl_certificate /etc/letsencrypt/live/edudev.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edudev.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://edudev.kz$request_uri;
}

server {
    listen 443 ssl http2;
    server_name edudev.kz;

    root /var/www/edudev;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/edudev.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edudev.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location /api/ {
        proxy_pass http://edudev_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control $cache_control_for_content;
        access_log off;
    }
}

server {
    listen 443 ssl http2;
    server_name crm.edudev.kz;

    root /var/www/edudev/crm;
    index index.html;
    client_max_body_size 30m;

